services:
  - type: web
    name: saha-satis-planlama
    runtime: python
    buildCommand: bash build.sh
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: NODE_VERSION
        value: "18"
      # Asagidaki 3 deger Render Dashboard > Environment > Edit'ten elle set edilecek.
      # sync: false demek "bu degeri YAML'da tutma, manuel gir" demek.
      - key: DATABASE_URL
        sync: false
      - key: TOMTOM_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      # OSRM (Faz 1'de kullanilacak, public oldugu icin acik kalabilir)
      - key: OSRM_BASE_URL
        value: "https://router.project-osrm.org"
